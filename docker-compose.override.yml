# Development overrides — automatically loaded by `docker compose up`
# For production: docker compose -f docker-compose.yml up
services:
  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      # Telegram bot — paste your BotFather token + bot username here to enable.
      # Leave empty to disable the feature.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npx next dev --turbo -H 0.0.0.0
